<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiliconGames</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Tomorrow',sans-serif;
    min-height:100vh;
    overflow-x:hidden;

    background:
    radial-gradient(circle at top,
    #1f2b4d 0%,
    #141824 35%,
    #0b0d13 100%);

    color:white;
}

/* Browser Bar */

.browser-bar{
    background:#000;
    height:80px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-bottom:1px solid rgba(255,255,255,.08);
}

.browser-url{

    width:90%;
    max-width:1200px;

    height:45px;

    border-radius:999px;

    background:#111;

    border:1px solid rgba(255,255,255,.1);

    display:flex;
    align-items:center;

    padding-left:20px;

    color:#bbb;

    font-size:14px;
}

/* Main Content */

.container{
    display:flex;
    flex-direction:column;
    align-items:center;

    padding-top:120px;
}

/* Logo */

.logo{
    font-size:92px;
    font-weight:700;

    letter-spacing:-3px;

    margin-bottom:50px;

    text-shadow:
    0 0 20px rgba(255,255,255,.08);
}

/* Search */

.search-container{
    width:700px;
    max-width:90%;
    margin-bottom:60px;
}

.search-wrapper{
    position:relative;
}

.search-box{

    width:100%;
    height:70px;

    border-radius:20px;

    border:1px solid rgba(255,255,255,.12);

    background:
    rgba(255,255,255,.06);

    backdrop-filter:blur(15px);

    color:white;

    font-size:24px;

    padding-left:25px;
    padding-right:60px;

    outline:none;

    transition:.25s;
}

.search-box::placeholder{
    color:#aaa;
}

.search-box:focus{
    border-color:
    rgba(255,255,255,.25);

    box-shadow:
    0 0 30px rgba(255,255,255,.08);
}

.search-icon{

    position:absolute;

    right:25px;
    top:50%;

    transform:translateY(-50%);

    opacity:.7;
}

/* Shortcuts */

.shortcuts{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(140px,1fr));

    gap:25px;

    width:850px;
    max-width:95%;
}

.shortcut{

    text-decoration:none;

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    transition:.25s;
}

.shortcut:hover{
    transform:
    translateY(-8px);
}

.shortcut-circle{

    width:110px;
    height:110px;

    border-radius:28px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;

    transition:.25s;
}

.shortcut:hover .shortcut-circle{

    background:
    rgba(255,255,255,.12);

    box-shadow:
    0 10px 30px rgba(0,0,0,.35);
}

.shortcut-label{

    margin-top:12px;

    font-size:18px;
    font-weight:500;
}

/* Mobile */

@media(max-width:768px){

    .logo{
        font-size:58px;
    }

    .search-box{
        height:60px;
        font-size:20px;
    }

    .shortcut-circle{
        width:90px;
        height:90px;
    }

}

</style>

</head>

<body>

<div class="browser-bar">

```
<div class="browser-url">
    🔒 silicongames.net
</div>
```

</div>

<div class="container">

```
<div class="logo">
    SiliconGames
</div>

<div class="search-container">

    <div class="search-wrapper">

        <input
        class="search-box"
        placeholder="Search the Web">

        <div class="search-icon">
            🔍
        </div>

    </div>

</div>

<div class="shortcuts">

    <a href="#" class="shortcut">
        <div class="shortcut-circle">🎮</div>
        <div class="shortcut-label">Games</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle">📱</div>
        <div class="shortcut-label">Apps</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle">🤝</div>
        <div class="shortcut-label">Partners</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle">📰</div>
        <div class="shortcut-label">Updates</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle">⚙️</div>
        <div class="shortcut-label">Settings</div>
    </a>

</div>
```

</div>

</body>
</html>
