<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiliconGames</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Tomorrow',sans-serif;
    min-height:100vh;
    overflow-x:hidden;

    background:
    radial-gradient(circle at top,
    #1f2b4d 0%,
    #141824 35%,
    #0b0d13 100%);

    color:white;
}

/* Browser Bar */

.browser-bar{
    background:#000;
    height:80px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-bottom:1px solid rgba(255,255,255,.08);
}

.browser-url{

    width:90%;
    max-width:1200px;

    height:45px;

    border-radius:999px;

    background:#111;

    border:1px solid rgba(255,255,255,.1);

    display:flex;
    align-items:center;

    padding-left:20px;

    color:#bbb;

    font-size:14px;
}

/* Main Content */

.container{
    display:flex;
    flex-direction:column;
    align-items:center;

    padding-top:120px;
}

/* Logo */

.logo{
    font-size:92px;
    font-weight:700;

    letter-spacing:-3px;

    margin-bottom:50px;

    text-shadow:
    0 0 20px rgba(255,255,255,.08);
}

/* Search */

.search-container{
    width:700px;
    max-width:90%;
    margin-bottom:60px;
}

.search-wrapper{
    position:relative;
}

.search-box{

    width:100%;
    height:70px;

    border-radius:20px;

    border:1px solid rgba(255,255,255,.12);

    background:
    rgba(255,255,255,.06);

    backdrop-filter:blur(15px);

    color:white;

    font-size:24px;

    padding-left:25px;
    padding-right:60px;

    outline:none;

    transition:.25s;
}

.search-box::placeholder{
    color:#aaa;
}

.search-box:focus{
    border-color:
    rgba(255,255,255,.25);

    box-shadow:
    0 0 30px rgba(255,255,255,.08);
}

.search-icon{

    position:absolute;

    right:25px;
    top:50%;

    transform:translateY(-50%);

    opacity:.7;
}

/* Shortcuts */

.shortcuts{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(140px,1fr));

    gap:25px;

    width:850px;
    max-width:95%;
}

.shortcut{

    text-decoration:none;

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    transition:.25s;
}

.shortcut:hover{
    transform:
    translateY(-8px);
}

.shortcut-circle{

    width:110px;
    height:110px;

    border-radius:28px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;

    transition:.25s;
}

.shortcut:hover .shortcut-circle{

    background:
    rgba(255,255,255,.12);

    box-shadow:
    0 10px 30px rgba(0,0,0,.35);
}

.shortcut-label{

    margin-top:12px;

    font-size:18px;
    font-weight:500;
}

/* Mobile */

@media(max-width:768px){

    .logo{
        font-size:58px;
    }

    .search-box{
        height:60px;
        font-size:20px;
    }

    .shortcut-circle{
        width:90px;
        height:90px;
    }

}

</style>

</head>

<body>

<div class="logo">
    SiliconGames
</div>

<div class="search-container">

    <div class="search-wrapper">

        <input
        class="search-box"
        placeholder="Search the Web">

        <div class="search-icon">
            🔍
        </div>

    </div>

</div>

<div class="shortcuts">

    <a href="#" class="shortcut">
        <div class="shortcut-circle"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-gamepad2-icon lucide-gamepad-2"><line x1="6" x2="10" y1="11" y2="11"/><line x1="8" x2="8" y1="9" y2="13"/><line x1="15" x2="15.01" y1="12" y2="12"/><line x1="18" x2="18.01" y1="10" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg></div>
        <div class="shortcut-label">Games</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-smartphone-icon lucide-smartphone"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg></div>
        <div class="shortcut-label">Apps</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-handshake-icon lucide-handshake"><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/></svg></div>
        <div class="shortcut-label">Partners</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-repeat-icon lucide-repeat"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
        </div>
        <div class="shortcut-label">Updates</div>
    </a>

    <a href="#" class="shortcut">
        <div class="shortcut-circle"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings-icon lucide-settings"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div class="shortcut-label">Settings</div>
    </a>

</div>

</div>

</body>
</html>
